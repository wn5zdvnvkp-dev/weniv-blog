<!DOCTYPE html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />

    <title>Weniv Blog</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
  </head>
  <body>
    <div id="app">
        <header>
            <div class="inner">
                <h1 class="logo">
                    <a href="./index.html">

                <nav>
