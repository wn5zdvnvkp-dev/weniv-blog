<!DOCTYPE html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weniv Blog</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
  </head>
  <body>
    <div id="app">
        <header>
            <div class="inner">
                <h1 class="logo">
                    <a href="./index.html">
                        <img src="./assets/img/Logo.svg" alt="B. My Blog">
                    </a>
                </h1>

                <nav>
                    <ul id="nav-guest">
                        <li>
                            <a href="./login.html">
                                <img src="./assets/img/Button/Login.svg" alt="로그인">
                            </a>
                        </li>
                        <li>
                            <a href="./signup.html">
                                <img src="./assets/img/Button/Register.svg" alt="회원가입">
                            </a>
                        </li>
                    </ul>

                    <ul id="nav-user" style="display: none;">
                        <li>
                            <a href="./mypage.html">
                                <img src="./assets/img/profile/none.svg" alt="마이페이지" id="user-profile">
                            </a>
                        </li>
                        <li>
                            <a href="./post-write.html">
                                <img src="./assets/img/Button/write.svg" alt="글쓰기">
                            </a>
                        </li>
                        <li>
                            <button id="btn-logout" type="button">
                                <img src="./assets/img/Button/Logout.svg" alt="로그아웃">
                            </button>
                        </li>
                    </ul>
                </nav>
            </div>
        </header>
    </div>

    <main>
        <section class="banner">
            <div class="inner">
                <div class="banner-content">
                    <p class="sub-title">React & Node</p>
                    <h2 class="main-title">My BLOG</h2>
                    <p class="description">
                        Lorem ipsum, dolor sit amet consectetur adipisicing elit. Ab quia praesentium ducimus, itaque sed sit blanditiis, earum tempore voluptatem assumenda rerum reprehenderit quo? Eos sapiente laudantium quidem repudiandae exercitationem. Tempore.
                    </p>
                </div>
            </div>
        </section>

        <section id="posts">
            <div class="inner"></div>
        </section>
    </main>

    <footer>
        <div class="inner">
            <p class="copyright">
                ©Wenaiv Corp.
            </p>
            <button type="button" id="btn-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})"><img src="./assets/img/Button/Top.svg" alt="맨 위로 이동"></button>
        </div>
    </footer>
    <script src="./js/api.js" defer></script>
    <script src="./js/utils.js" defer></script>
    <script src="./js/main.js" defer></script>
  </body>
</html>
