<!DOCTYPE html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/auth.css">
  </head>
  <body>
    <div id="app">
        <header>
            <div class="inner">
                <h1 class="logo">
                    <a href="./index.html">
                        <img src="./assets/img/Logo.svg" alt="B. My Blog">
                    </a>
                </h1>

                <nav>
                    <ul id="nav-guest">
                        <li>
                            <a href="./login.html">
                                <img src="./assets/img/Button/Login.svg" alt="로그인">
                            </a>
                        </li>
                        <li>
                            <a href="./signup.html">
                                <img src="./assets/img/Button/Register.svg" alt="회원가입">
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </header>
    </div>

    <main class="login-page">
        <section class="auth-box">
            <h2>LOGIN</h2>

            <form id="login-form">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="6+ characters" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="6+ characters" required>
                </div>

                <button type="submit" class="btn-login">
                    <img src="./assets/img/Button/Default.svg" alt="LOGIN">
                </button>
            </form>

            <a href="./signup.html" class="link-register">Register</a>
        </section>
    </main>

    <footer>
        <div class="inner">
            <p class="copyright">
                ©Wenaiv Corp.
            </p>
            <button type="button" id="btn-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})"><img src="./assets/img/Button/Top.svg" alt="맨 위로 이동"></button>
        </div>
    </footer>
  </body>
</html>
