<!DOCTYPE html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/auth.css">
  </head>
  <body>
    <div id="app">
        <header>
            <div class="inner">
                <h1 class="logo">
                    <a href="./index.html">
                        <img src="./assets/img/Logo.svg" alt="B. My Blog">
                    </a>
                </h1>

                <nav>
                    <ul id="nav-guest">
                        <li>
                            <a href="./login.html">
                                <img src="./assets/img/Button/Login.svg" alt="로그인">
                            </a>
                        </li>
                        <li>
                            <a href="./signup.html">
                                <img src="./assets/img/Button/Register.svg" alt="회원가입">
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </header>
    </div>

    <main class="signup-page">
        <section class="auth-box">
            <h2>REGISTER</h2>

            <form id="signup-form">
                <div class="profile-upload">
                    <div class="profile-preview">
                        <img src="./assets/img/profile/none.svg" alt="프로필 미리보기" id="img-preview">
                        <label for="profile-img" class="btn-upload">
                            <img src="./assets/img/Button/file.svg" alt="이미지 업로드">
                        </label>
                    </div>
                    <input type="file" id="profile-img" accept="image/*" style="display: none;">
                </div>

                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder=" " required>
                </div>

                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="ex) blog@log.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="6+ characters" required>
                </div>

                <button type="submit" class="btn-primary">
                    REGISTER
                </button>
            </form>
        </section>
    </main>

    <footer>
        <div class="inner">
            <p class="copyright">
                ©Wenaiv Corp.
            </p>
            <button type="button" id="btn-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})"><img src="./assets/img/Button/Top.svg" alt="맨 위로 이동"></button>
        </div>
    </footer>
  </body>
</html>
